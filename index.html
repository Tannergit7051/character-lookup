<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Character AI Generator v5</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1020;
  color:white;
}

header{
  padding:18px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
  background:#111827;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

input, textarea{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:8px;
  border:none;
  font-size:14px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.card{
  background:#1f2937;
  padding:10px;
  border-radius:10px;
  margin-bottom:8px;
  cursor:pointer;
}

.card:hover{ background:#374151; }

.name{ font-weight:bold; }
.desc{ font-size:12px; opacity:0.8; margin-top:5px; }

button{
  padding:12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#6366f1;
  color:white;
  font-weight:bold;
  width:100%;
  margin-top:10px;
}

#output img{
  width:100%;
  border-radius:12px;
  margin-top:10px;
}

.small{
  font-size:12px;
  opacity:0.7;
}
</style>
</head>

<body>

<header>⚡ Character Generator v5 (50 Deep Characters)</header>

<div class="container">

<input id="search" placeholder="Search character (typos supported)">

<div class="grid">

<div>
<h3>Database</h3>
<div id="list"></div>
</div>

<div>
<h3>Generator</h3>

<input id="char" placeholder="Character name">
<textarea id="scene" placeholder="Scene (battle, portrait, etc)"></textarea>
<textarea id="style" placeholder="Style (anime, realistic, cinematic)"></textarea>
<textarea id="neg" placeholder="Negative prompt"></textarea>

<button onclick="generate()">Generate Image</button>

<div id="output"></div>
</div>

</div>

</div>

<script>

const API = "https://character-lookup.onrender.com/lookup?name=";

const chars = [
{
n:"Nami",
a:["nami one piece","navigator nami"],
d:"Orange wavy hair, sharp brown eyes, slim athletic build, tan skin, tattoo on shoulder, intelligent navigator of Straw Hat Pirates."
},
{
n:"Rin Tohsaka",
a:["rin","tohsaka rin fate"],
d:"Twin-tail dark hair, blue eyes, fair skin, magical mage family heir, elegant confident posture."
},
{
n:"Mikasa Ackerman",
a:["mikasa"],
d:"Short black hair, gray eyes, muscular combat build, red scarf, elite soldier of Survey Corps."
},
{
n:"Yamato",
a:["yamato one piece"],
d:"Tall muscular woman, white long hair, horns, divine warrior aura, heavy combat physique."
},
{
n:"Rias Gremory",
a:["rias"],
d:"Crimson long hair, blue eyes, noble demon princess, voluptuous elegant build."
},
{
n:"Zero Two",
a:["002","zero two darling"],
d:"Pink hair, red horns, hybrid human-klaxosaur, seductive dangerous fighter."
},
{
n:"Marin Kitagawa",
a:["marin"],
d:"Blonde pink-tipped hair, fashionable gyaru style, expressive cheerful personality."
},
{
n:"Nezuko Kamado",
a:["nezuko"],
d:"Black hair orange tips, bamboo muzzle, demon form, gentle protective nature."
},
{
n:"Shinobu Kocho",
a:["shinobu"],
d:"Butterfly-themed haori, purple gradient hair, calm smiling poison expert."
},
{
n:"Makima",
a:["makima chainsaw"],
d:"Red hair, golden eyes, controlled aura, unsettling calm authority figure."
},
{
n:"Power",
a:["power csm"],
d:"Blonde messy hair, horns, chaotic personality, devil hybrid energy."
},
{
n:"Asuna",
a:["asuna sao"],
d:"Brown hair, rapier fighter, elegant sword skills, strong leadership aura."
},
{
n:"Rem",
a:["rem re zero"],
d:"Blue hair, maid outfit, loyal emotional expression, combat maid."
},
{
n:"Emilia",
a:["emilia re zero"],
d:"Silver hair, elf traits, calm gentle magical aura."
},
{
n:"Raphtalia",
a:["raphtalia"],
d:"Fox-eared warrior girl, brown hair, sword fighter with loyal heart."
},
{
n:"Eris",
a:["eris mushoku"],
d:"Red hair, aggressive swordswoman, wild combat personality."
},
{
n:"Roxy Migurdia",
a:["roxy"],
d:"Blue hair mage, small body, wizard hat, calm teacher personality."
},
{
n:"Momo Yaoyorozu",
a:["momo"],
d:"Black hair, intelligent hero student, tactical creation powers."
},
{
n:"Toga Himiko",
a:["toga"],
d:"Blonde chaotic vampire-like villain, psychotic cheerful energy."
},
{
n:"Ochaco Uraraka",
a:["ochaco"],
d:"Brown bob hair, floating gravity hero, cheerful personality."
},
{
n:"Hinata Hyuga",
a:["hinata"],
d:"Dark hair, pale eyes, shy gentle ninja, byakugan user."
},
{
n:"Sakura Haruno",
a:["sakura"],
d:"Pink hair, strong medical ninja, evolving fighter personality."
}
];

const list = document.getElementById("list");
const search = document.getElementById("search");

function match(c,q){
q=q.toLowerCase();
return c.n.toLowerCase().includes(q) || c.a.some(x=>x.includes(q));
}

function render(q=""){
list.innerHTML="";
chars.filter(c=>match(c,q)).forEach(c=>{
const div=document.createElement("div");
div.className="card";
div.innerHTML=`
<div class="name">${c.n}</div>
<div class="desc">${c.d}</div>
`;
div.onclick=()=>{
document.getElementById("char").value=c.n;
};
list.appendChild(div);
});
}

search.addEventListener("input",e=>render(e.target.value));

render();

async function generate(){
const name=document.getElementById("char").value;
const scene=document.getElementById("scene").value;
const style=document.getElementById("style").value;
const neg=document.getElementById("neg").value;

const res=await fetch(API+encodeURIComponent(name));
const data=await res.json();

const prompt=
data.prompt + ", " + scene + ", " + style +
", masterpiece, best quality";

const url=
"https://image.pollinations.ai/prompt/" +
encodeURIComponent(prompt + " negative: " + neg);

document.getElementById("output").innerHTML=
"<div class='small'>"+prompt+"</div><img src='"+url+"'>";
}

</script>

</body>
</html>
