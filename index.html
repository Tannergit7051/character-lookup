<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Character AI Generator Pro</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  padding: 20px;
}
.container {
  max-width: 1200px;
  margin: 0 auto;
  background: white;
  border-radius: 20px;
  padding: 40px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
h1 {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  font-size: 36px;
  margin-bottom: 10px;
  font-weight: 800;
}
.subtitle {
  color: #666;
  margin-bottom: 30px;
  font-size: 15px;
}
.input-group {
  margin-bottom: 25px;
}
label {
  display: block;
  margin-bottom: 10px;
  font-weight: 600;
  color: #333;
  font-size: 15px;
}
input[type="text"], textarea {
  width: 100%;
  padding: 14px 18px;
  border: 2px solid #e0e0e0;
  border-radius: 10px;
  font-size: 15px;
}
textarea {
  resize: vertical;
  min-height: 90px;
}
.btn {
  padding: 14px 28px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
}
.btn-primary {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
}
.char-preview {
  display: none;
}
.char-preview.show {
  display: block;
}
#status {
  margin: 20px 0;
  display: none;
}
#status.show { display: block; }
.spinner {
  display: none;
}
.spinner.show { display: block; }
#gallery {
  margin-top: 30px;
}
</style>
</head>

<body>

<div class="container">
  <h1>Character AI Generator</h1>
  <p class="subtitle">Render + GitHub Pages setup</p>

  <div class="input-group">
    <label>Character Name</label>
    <input type="text" id="charName">
    <button class="btn btn-primary" onclick="lookupChar()">Lookup</button>
  </div>

  <div id="status"></div>
  <div class="spinner" id="spinner"></div>
</div>

<script>

const API_BASE = 'https://character-lookup.onrender.com';

let charData = null;

function showStatus(msg) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'show';
}

async function lookupChar() {
  const name = document.getElementById('charName').value.trim();
  if (!name) return;

  showStatus('Loading...');
  document.getElementById('spinner').classList.add('show');

  try {

    // ✅ FIXED FETCH BLOCK (ONLY CHANGE)
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 15000);

    const res = await fetch(API_BASE + '/lookup?name=' + encodeURIComponent(name), {
      signal: controller.signal
    });

    clearTimeout(timeout);

    if (!res.ok) throw new Error('API returned ' + res.status);

    const data = await res.json();

    console.log("API response:", data);

    showStatus('Found: ' + data.prompt.split(',')[0]);

  } catch (err) {
    showStatus('Failed: ' + err.message);
  }

  document.getElementById('spinner').classList.remove('show');
}

</script>

</body>
</html>
